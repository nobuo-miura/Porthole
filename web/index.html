<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porthole</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#3B82F6'
          }
        }
      }
    }
  </script>
  <style>
    /* Protocol selector cards */
    .proto-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 6px;
      border-radius: 10px;
      border: 1.5px solid #374151;
      background: #111827;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .proto-btn:hover {
      border-color: #4b5563;
      color: #d1d5db;
      background: #1f2937;
    }
    .proto-btn.active {
      border-color: #3b82f6;
      background: #1d4ed8;
      color: #ffffff;
      box-shadow: 0 0 0 1px #3b82f6, 0 4px 12px rgba(59,130,246,0.25);
    }
    /* small checkmark badge on active */
    .proto-btn.active::after {
      content: '✓';
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 9px;
      font-weight: 700;
      color: #93c5fd;
      line-height: 1;
    }
    .proto-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .proto-label {
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      text-align: center;
    }
    /* badge removed */
    .proto-badge { display: none; }
    /* Label + input rows: label fixed width, inputs all start at same position */
    .fields-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .fields-group > div {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fields-group .field-label {
      width: 96px;
      min-width: 96px;
      margin-bottom: 0;
      text-align: right;
    }
    .fields-group .field-input {
      flex: 1;
    }
    .field-select {
      flex: 1;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.875rem;
      color: #f9fafb;
      -webkit-text-fill-color: #f9fafb;
      cursor: pointer;
    }
    .field-select:focus {
      outline: none;
      box-shadow: 0 0 0 2px #3b82f6;
    }
    .field-label {
      @apply block text-xs font-medium text-gray-400 mb-1;
    }
    .field-optional {
      display: block;
      color: #4b5563;
      font-weight: 400;
      font-size: 10px;
      text-align: right;
      line-height: 1.3;
    }
    .field-input {
      @apply w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500;
      color: #f9fafb;           /* gray-50: explicit so browser dark mode can't override */
      -webkit-text-fill-color: #f9fafb; /* Safari / autofill override */
      caret-color: #f9fafb;
    }
    .field-input::placeholder {
      color: #4b5563;           /* gray-600 */
      -webkit-text-fill-color: #4b5563;
    }
    /* Prevent browser autofill from painting its own background/text */
    .field-input:-webkit-autofill,
    .field-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #1f2937 inset;
      -webkit-text-fill-color: #f9fafb;
    }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #3B82F6;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-enter { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-white flex items-center gap-3">
        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
        </svg>
        Porthole
      </h1>
      <p class="text-gray-400 mt-1">Test connectivity to databases, caches, message queues, and ports</p>
    </div>

    <!-- Main Form -->
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 mb-6">
      <!-- Protocol Selector -->
      <div class="mb-6">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Protocol</p>
        <div class="grid grid-cols-3 sm:grid-cols-5 lg:grid-cols-6 gap-2" id="type-tabs">

          <!-- Network -->
          <button class="proto-btn active" data-type="tcp" data-color="blue">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            <span class="proto-label">TCP</span>
            <span class="proto-badge">Port</span>
          </button>

          <button class="proto-btn" data-type="udp" data-color="blue">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
            </svg>
            <span class="proto-label">UDP</span>
            <span class="proto-badge">Port</span>
          </button>

          <!-- Databases -->
          <button class="proto-btn" data-type="mysql" data-color="orange">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path stroke-linecap="round" d="M3 5v4c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/>
              <path stroke-linecap="round" d="M3 9v4c0 1.657 4.03 3 9 3s9-1.343 9-3V9"/>
              <path stroke-linecap="round" d="M3 13v4c0 1.657 4.03 3 9 3s9-1.343 9-3v-4"/>
            </svg>
            <span class="proto-label">MySQL</span>
            <span class="proto-badge">DB</span>
          </button>

          <button class="proto-btn" data-type="postgres" data-color="indigo">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path stroke-linecap="round" d="M3 5v4c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/>
              <path stroke-linecap="round" d="M3 9v4c0 1.657 4.03 3 9 3s9-1.343 9-3V9"/>
              <path stroke-linecap="round" d="M3 13v4c0 1.657 4.03 3 9 3s9-1.343 9-3v-4"/>
            </svg>
            <span class="proto-label">PostgreSQL</span>
            <span class="proto-badge">DB</span>
          </button>

          <button class="proto-btn" data-type="sqlserver" data-color="blue">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path stroke-linecap="round" d="M3 5v4c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/>
              <path stroke-linecap="round" d="M3 9v6c0 1.657 4.03 3 9 3s9-1.343 9-3V9"/>
            </svg>
            <span class="proto-label">SQL Server</span>
            <span class="proto-badge">DB</span>
          </button>

          <button class="proto-btn" data-type="mongodb" data-color="green">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C9 7 7 10 7 13a5 5 0 0010 0c0-3-2-6-5-11z"/>
              <path stroke-linecap="round" d="M12 17v5"/>
            </svg>
            <span class="proto-label">MongoDB</span>
            <span class="proto-badge">DB</span>
          </button>

          <!-- Cache / Queue -->
          <button class="proto-btn" data-type="redis" data-color="red">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            <span class="proto-label">Redis</span>
            <span class="proto-badge">Cache</span>
          </button>

          <button class="proto-btn" data-type="elasticsearch" data-color="yellow">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="11" cy="11" r="8"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M8 11h6"/>
            </svg>
            <span class="proto-label">Elasticsearch</span>
            <span class="proto-badge">Search</span>
          </button>

          <button class="proto-btn" data-type="rabbitmq" data-color="orange">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M4 19h16a1 1 0 001-1V6a1 1 0 00-1-1H4a1 1 0 00-1 1v12a1 1 0 001 1z"/>
            </svg>
            <span class="proto-label">RabbitMQ</span>
            <span class="proto-badge">Queue</span>
          </button>

          <button class="proto-btn" data-type="smtp" data-color="purple">
            <svg class="proto-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <span class="proto-label">SMTP</span>
            <span class="proto-badge">Mail</span>
          </button>

        </div>
      </div>

      <!-- Dynamic Form -->
      <form id="check-form">
        <input type="hidden" id="type-input" value="tcp">

        <!-- Shared layout: each fields-group uses the same row structure -->

        <!-- TCP / UDP -->
        <div id="fields-tcp" class="fields-group">
          <div>
            <label class="field-label">Host / IP</label>
            <input class="field-input" type="text" name="host" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port" placeholder="80" min="1" max="65535">
          </div>
        </div>

        <!-- MySQL -->
        <div id="fields-mysql" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_mysql" placeholder="mysql://user:pass@host:3306/dbname">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_mysql" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_mysql" placeholder="3306">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_mysql" placeholder="root">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_mysql">
          </div>
          <div>
            <label class="field-label">Database</label>
            <input class="field-input" type="text" name="database_mysql" placeholder="mydb">
          </div>
          <div>
            <label class="field-label">SSL Mode</label>
            <select class="field-select" name="ssl_mode_mysql">
              <option value="">disable</option>
              <option value="skip-verify">require (skip verify)</option>
              <option value="require">require (verify cert)</option>
            </select>
          </div>
        </div>

        <!-- PostgreSQL -->
        <div id="fields-postgres" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_postgres" placeholder="postgres://user:pass@host:5432/dbname">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_postgres" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_postgres" placeholder="5432">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_postgres" placeholder="postgres">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_postgres">
          </div>
          <div>
            <label class="field-label">Database</label>
            <input class="field-input" type="text" name="database_postgres" placeholder="postgres">
          </div>
          <div>
            <label class="field-label">SSL Mode</label>
            <select class="field-select" name="ssl_mode_postgres">
              <option value="disable">disable</option>
              <option value="require">require</option>
              <option value="verify-ca">verify-ca</option>
              <option value="verify-full">verify-full</option>
            </select>
          </div>
        </div>

        <!-- SQL Server -->
        <div id="fields-sqlserver" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_sqlserver" placeholder="sqlserver://user:pass@host:1433?database=mydb">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_sqlserver" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_sqlserver" placeholder="1433">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_sqlserver" placeholder="sa">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_sqlserver">
          </div>
          <div>
            <label class="field-label">Database</label>
            <input class="field-input" type="text" name="database_sqlserver" placeholder="master">
          </div>
          <div>
            <label class="field-label">SSL Mode</label>
            <select class="field-select" name="ssl_mode_sqlserver">
              <option value="">disable</option>
              <option value="skip-verify">require (skip verify)</option>
              <option value="require">require (verify cert)</option>
            </select>
          </div>
        </div>

        <!-- MongoDB -->
        <div id="fields-mongodb" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_mongodb" placeholder="mongodb://user:pass@host:27017">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_mongodb" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_mongodb" placeholder="27017">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_mongodb">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_mongodb">
          </div>
          <div>
            <label class="field-label">SSL Mode</label>
            <select class="field-select" name="ssl_mode_mongodb">
              <option value="">disable</option>
              <option value="skip-verify">require (skip verify)</option>
              <option value="require">require (verify cert)</option>
            </select>
          </div>
        </div>

        <!-- Redis -->
        <div id="fields-redis" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_redis" placeholder="redis://:password@localhost:6379/0">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_redis" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_redis" placeholder="6379">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_redis">
          </div>
          <div>
            <label class="field-label">SSL Mode</label>
            <select class="field-select" name="ssl_mode_redis">
              <option value="">disable</option>
              <option value="skip-verify">require (skip verify)</option>
              <option value="require">require (verify cert)</option>
            </select>
          </div>
        </div>

        <!-- Elasticsearch -->
        <div id="fields-elasticsearch" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_elasticsearch" placeholder="http://localhost:9200">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_elasticsearch" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_elasticsearch" placeholder="9200">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_elasticsearch" placeholder="elastic">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_elasticsearch">
          </div>
        </div>

        <!-- RabbitMQ -->
        <div id="fields-rabbitmq" class="fields-group hidden">
          <div>
            <label class="field-label">URI <span class="field-optional">(optional — overrides fields below)</span></label>
            <input class="field-input" type="text" name="uri_rabbitmq" placeholder="amqp://guest:guest@localhost:5672/">
          </div>
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_rabbitmq" placeholder="localhost">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_rabbitmq" placeholder="5672">
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username_rabbitmq" placeholder="guest">
          </div>
          <div>
            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password_rabbitmq" placeholder="guest">
          </div>
        </div>

        <!-- SMTP -->
        <div id="fields-smtp" class="fields-group hidden">
          <div>
            <label class="field-label">Host</label>
            <input class="field-input" type="text" name="host_smtp" placeholder="smtp.example.com">
          </div>
          <div>
            <label class="field-label">Port</label>
            <input class="field-input" type="number" name="port_smtp" placeholder="25">
          </div>
        </div>

        <!-- Timeout + Submit -->
        <div class="mt-4 flex flex-col gap-3">
          <div class="flex items-center gap-3">
            <label class="field-label" style="width:96px;min-width:96px;text-align:right;margin-bottom:0">Timeout (sec)</label>
            <input class="field-input" type="number" id="timeout-input" value="5" min="1" max="30" style="max-width:100px">
          </div>
          <div class="flex items-center gap-3">
            <div style="width:96px;min-width:96px"></div>
            <button type="submit" id="submit-btn"
              class="flex-1 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
              <span id="btn-spinner" class="spinner hidden"></span>
              <span id="btn-text">Test Connection</span>
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Result -->
    <div id="result-area"></div>

    <!-- Batch Checker -->
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 mb-6 mt-6">
      <h2 class="text-lg font-semibold mb-3 text-gray-200">Batch TCP Check</h2>
      <p class="text-gray-400 text-sm mb-3">Enter one <code class="bg-gray-800 px-1 rounded">host:port</code> per line. All will be tested concurrently.</p>
      <textarea id="batch-input"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
        rows="4" placeholder="localhost:5432&#10;redis.internal:6379&#10;10.0.0.1:27017"></textarea>
      <button id="batch-btn" class="mt-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 px-5 rounded-lg transition-colors text-sm">
        Test All
      </button>
      <div id="batch-results" class="mt-4 space-y-2"></div>
    </div>

    <!-- History -->
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-200">History</h2>
        <button id="clear-history-btn" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">Clear</button>
      </div>
      <div id="history-list" class="space-y-2 text-sm">
        <p class="text-gray-500 text-sm">No checks yet.</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
